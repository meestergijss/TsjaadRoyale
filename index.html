<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#game {
  background: linear-gradient(180deg, #c8a96e 0%, #d4b07a 40%, #c9a060 100%);
  width: 100%;
  min-height: 520px;
  position: relative;
  overflow: hidden;
  border-radius: var(--border-radius-lg);
  user-select: none;
}
#sky {
  position: absolute; top: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(180deg, #87CEEB 0%, #c8a96e 100%);
}
#sun {
  position: absolute; top: 10px; right: 60px;
  width: 40px; height: 40px; border-radius: 50%;
  background: #FFD700;
}
.lane {
  position: absolute; bottom: 100px; left: 0; right: 0;
  height: 60px;
  background: rgba(180,130,60,0.3);
  border-top: 2px dashed rgba(180,130,60,0.5);
  border-bottom: 2px dashed rgba(180,130,60,0.5);
}
#ground { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: #b8862a; }
#ground2 { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: #a0721a; }

.hut {
  position: absolute; bottom: 100px;
  display: flex; flex-direction: column; align-items: center;
}
.hut-body {
  width: 52px; height: 44px;
  background: #c4956a;
  border: 2px solid #8B6347;
  border-radius: 2px;
  position: relative;
  display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
  padding-bottom: 4px;
}
.hut-roof {
  width: 0; height: 0;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  border-bottom: 22px solid #8B4513;
}
.hut-door { width: 14px; height: 18px; background: #5a3010; border-radius: 7px 7px 0 0; }
.hut-hp {
  font-size: 11px; font-weight: 500; color: #fff;
  background: rgba(0,0,0,0.55); border-radius: 6px;
  padding: 1px 5px; margin-top: 3px; white-space: nowrap;
}
.hp-bar-wrap { width: 52px; height: 6px; background: #555; border-radius: 3px; margin-top: 2px; }
.hp-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }

.unit {
  position: absolute; bottom: 108px;
  display: flex; flex-direction: column; align-items: center;
  transition: left 0.08s linear;
  z-index: 10;
}
.unit-body {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  border: 2px solid rgba(0,0,0,0.3);
}
.unit-hp-bar { width: 28px; height: 4px; background: #555; border-radius: 2px; margin-top: 2px; }
.unit-hp-fill { height: 100%; border-radius: 2px; background: #4ade80; }

#ui-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
  background: rgba(40,24,8,0.92);
  border-top: 2px solid #a0721a;
  display: flex; align-items: center; padding: 0 12px; gap: 10px;
}
.card-btn {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(180,130,60,0.25); border: 1.5px solid #a0721a;
  border-radius: var(--border-radius-md); padding: 6px 8px; cursor: pointer;
  transition: background 0.15s; min-width: 70px;
  color: #f0d090;
}
.card-btn:hover { background: rgba(180,130,60,0.5); }
.card-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.card-btn .card-name { font-size: 10px; font-weight: 500; text-align: center; }
.card-btn .card-cost { font-size: 12px; color: #60c0ff; margin-top: 2px; }
.card-btn .card-icon { font-size: 18px; }

#water-bar {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: #60c0ff; font-size: 12px; font-weight: 500; margin-right: 6px;
}
#water-fill-wrap { width: 16px; height: 70px; background: rgba(0,0,0,0.4); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
#water-fill { width: 100%; background: #4090dd; border-radius: 8px; transition: height 0.2s; }
#water-count { font-size: 14px; color: #80d0ff; }

#msg {
  position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #ffd080; font-size: 15px; font-weight: 500;
  border-radius: var(--border-radius-md); padding: 6px 18px;
  display: none; white-space: nowrap; z-index: 100;
}
#game-over {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; color: #fff; gap: 14px; border-radius: var(--border-radius-lg);
}
#game-over h2 { font-size: 28px; font-weight: 500; }
#game-over p { font-size: 15px; color: #f0d090; }
#restart-btn {
  background: #a0721a; border: none; color: #fff; font-size: 14px; font-weight: 500;
  padding: 10px 28px; border-radius: var(--border-radius-md); cursor: pointer;
  margin-top: 6px;
}
#restart-btn:hover { background: #c08820; }
#score-area { position: absolute; top: 86px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; z-index: 50; }
.score-box { background: rgba(0,0,0,0.55); color: #fff; font-size: 12px; border-radius: 6px; padding: 3px 10px; }
.score-box span { color: #ffd080; font-weight: 500; }
</style>

<div id="game">
  <div id="sky"></div>
  <div id="sun"></div>
  <div class="lane" style="bottom:108px"></div>
  <div class="lane" style="bottom:148px; opacity:0.4"></div>
  <div id="ground"></div>
  <div id="ground2"></div>

  <div class="hut" id="my-hut" style="left:18px">
    <div class="hut-roof"></div>
    <div class="hut-body"><div class="hut-door"></div></div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="my-hut-bar" style="background:#4ade80;width:100%"></div></div>
    <div class="hut-hp" id="my-hut-hp">35HP</div>
  </div>
  <div class="hut" id="enemy-hut" style="right:18px; left:auto;">
    <div class="hut-roof" style="border-bottom-color:#8B2500"></div>
    <div class="hut-body" style="background:#c46a6a; border-color:#8B2500"><div class="hut-door"></div></div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="enemy-hut-bar" style="background:#f87171;width:100%"></div></div>
    <div class="hut-hp" id="enemy-hut-hp">35HP</div>
  </div>

  <div id="score-area">
    <div class="score-box">Jij: <span id="p-score">0</span></div>
    <div class="score-box">afrikano tsjaadano: <span id="e-score">0</span></div>
  </div>

  <div id="msg"></div>
  <div id="units-layer"></div>

  <div id="game-over">
    <h2 id="go-title">Game Over</h2>
    <p id="go-msg">De hutjes zijn kapot!</p>
    <button id="restart-btn" onclick="startGame()">Opnieuw arm zijn? </button>
  </div>

  <div id="ui-bottom">
    <div id="water-bar">
      <div id="water-fill-wrap"><div id="water-fill" style="height:0%"></div></div>
      <div id="water-count">0💧</div>
    </div>
    <div class="card-btn" id="card0" onclick="placeUnit(0)">
      <div class="card-icon">⚔️</div>
      <div class="card-name">Tsjaad Vechter</div>
      <div class="card-cost">3💧 | 4dmg 6hp</div>
    </div>
    <div class="card-btn" id="card1" onclick="placeUnit(1)">
      <div class="card-icon">🪨</div>
      <div class="card-name">Zand Gooier</div>
      <div class="card-cost">4💧 | 1dmg 4hp</div>
    </div>
    <div class="card-btn" id="card2" onclick="placeUnit(2)">
      <div class="card-icon">🦁</div>
      <div class="card-name">tsjaadinator</div>
      <div class="card-cost">7💧 | dmg 15hp</div>
    </div>
    <div style="flex:1"></div>
    <div style="color:#a0a0a0; font-size:11px; text-align:right; line-height:1.6;">Zand Gooier<br>valt op afstand aan</div>
  </div>
</div>
 <div class="card-btn" id="card1" onclick="placeUnit(3)">
      <div class="card-icon">arm</div>
      <div class="card-name">bedelaar</div>
      <div class="card-cost">1💧 | 1dmg 1hp</div>
    </div>
<script>
const CARDS = [
  { name: 'Tsjaad Vechter', cost: 3, dmg: 3, hp: 6, range: 10, color: '#d97706', icon: '⚔' },
  { name: 'Zand Gooier',   cost: 4, dmg: 2, hp: 4, range: 80, color: '#6b7280', icon: '🪨' },
  { name: 'tsjaadinator', cost: 7, dmg: 5, hp: 10, range: 10, color: '#7c3aed', icon: '🦁' },
];
const MAX_WATER = 10;
const WATER_RATE = 1.2;
const UNIT_SPEED = 1.1;
const ATTACK_RATE = 1200;
const GAME_W = () => document.getElementById('game').offsetWidth;

let water = 5, units = [], nextId = 0, gameRunning = false, gameLoop, waterInterval;
let myHutHp = 35, enemyHutHp = 35;
let lastAiSpawn = 0;

function getGW() { return document.getElementById('game').offsetWidth; }

function startGame() {
  water = 5; units = []; nextId = 0;
  myHutHp = 25; enemyHutHp = 25; lastAiSpawn = 0;
  document.getElementById('units-layer').innerHTML = '';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('p-score').textContent = '0';
  document.getElementById('e-score').textContent = '0';
  updateHutUI();
  updateWaterUI();
  updateCardUI();
  gameRunning = true;
  clearInterval(waterInterval);
  clearInterval(gameLoop);
  waterInterval = setInterval(() => {
    if (!gameRunning) return;
    water = Math.min(MAX_WATER, water + WATER_RATE * 0.25);
    updateWaterUI(); updateCardUI();
  }, 250);
  gameLoop = setInterval(tick, 60);
}

function showMsg(txt) {
  const m = document.getElementById('msg');
  m.textContent = txt; m.style.display = 'block';
  clearTimeout(m._t);
  m._t = setTimeout(() => m.style.display = 'none', 1200);
}

function updateWaterUI() {
  document.getElementById('water-fill').style.height = (water / MAX_WATER * 100) + '%';
  document.getElementById('water-count').textContent = Math.floor(water) + '💧';
}

function updateCardUI() {
  CARDS.forEach((c, i) => {
    const el = document.getElementById('card' + i);
    if (Math.floor(water) < c.cost) el.classList.add('disabled');
    else el.classList.remove('disabled');
  });
}

function updateHutUI() {
  const mh = Math.max(0, myHutHp), eh = Math.max(0, enemyHutHp);
  document.getElementById('my-hut-hp').textContent = mh + ' HP';
  document.getElementById('enemy-hut-hp').textContent = eh + ' HP';
  document.getElementById('my-hut-bar').style.width = (mh / 25 * 100) + '%';
  document.getElementById('enemy-hut-bar').style.width = (eh / 25 * 100) + '%';
  const mb = document.getElementById('my-hut-bar');
  mb.style.background = mh > 15 ? '#4ade80' : mh > 8 ? '#facc15' : '#f87171';
}

function placeUnit(cardIdx) {
  const c = CARDS[cardIdx];
  if (!gameRunning || Math.floor(water) < c.cost) { showMsg('Niet genoeg waterdruppels!'); return; }
  water -= c.cost;
  updateWaterUI(); updateCardUI();
  spawnUnit(cardIdx, true);
}

function spawnUnit(cardIdx, isPlayer) {
  const c = CARDS[cardIdx];
  const gw = getGW();
  const enemyHutX = gw - 80;
  const myHutX = 70;
  const id = 'u' + nextId++;
  const startX = isPlayer ? 90 : enemyHutX - 30;
  const unit = {
    id, cardIdx, isPlayer,
    x: startX,
    hp: c.hp, maxHp: c.hp,
    dmg: c.dmg, range: c.range,
    lastAtk: 0, attacking: false
  };
  units.push(unit);
  const el = document.createElement('div');
  el.className = 'unit'; el.id = id;
  el.innerHTML = `<div class="unit-body" style="background:${c.color};color:#fff">${c.icon[0]}</div><div class="unit-hp-bar"><div class="unit-hp-fill" id="hf-${id}" style="width:100%"></div></div>`;
  el.style.left = startX + 'px';
  document.getElementById('units-layer').appendChild(el);
}

function tick() {
  if (!gameRunning) return;
  const now = Date.now();
  const gw = getGW();
  const enemyHutX = gw - 75;
  const myHutX = 70;

  // AI spawn
  if (now - lastAiSpawn > 3800) {
    lastAiSpawn = now;
    const pick = Math.random() < 0.5 ? 0 : (Math.random() < 0.6 ? 1 : 2);
    spawnUnit(pick, false);
  }

  const toRemove = [];
  for (let u of units) {
    const el = document.getElementById(u.id);
    if (!el) { toRemove.push(u.id); continue; }

    let targetX = u.isPlayer ? enemyHutX : myHutX;
    let dir = u.isPlayer ? 1 : -1;
    let blocked = false;

    // Find nearest enemy unit
    let nearestEnemy = null, nearestDist = Infinity;
    for (let o of units) {
      if (o.isPlayer === u.isPlayer || o.hp <= 0) continue;
      const dist = Math.abs(o.x - u.x);
      if (dist < nearestDist) { nearestDist = dist; nearestEnemy = o; }
    }

    // Check if hut is in range
    let hutDist = u.isPlayer ? Math.abs(u.x - enemyHutX) : Math.abs(u.x - myHutX);

    if (nearestEnemy && nearestDist <= u.range) {
      // Attack unit
      blocked = true;
      if (now - u.lastAtk > ATTACK_RATE) {
        nearestEnemy.hp -= u.dmg;
        u.lastAtk = now;
        const oEl = document.getElementById(nearestEnemy.id);
        if (oEl) {
          const hf = document.getElementById('hf-' + nearestEnemy.id);
          if (hf) hf.style.width = Math.max(0, nearestEnemy.hp / nearestEnemy.maxHp * 100) + '%';
          if (nearestEnemy.hp <= 0) {
            oEl.style.opacity = '0'; oEl.style.transition = 'opacity 0.3s';
            setTimeout(() => oEl.remove(), 320);
            toRemove.push(nearestEnemy.id);
          }
        }
      }
    } else if (hutDist <= u.range + 5) {
      // Attack hut
      blocked = true;
      if (now - u.lastAtk > ATTACK_RATE) {
        if (u.isPlayer) { enemyHutHp -= u.dmg; } else { myHutHp -= u.dmg; }
        u.lastAtk = now;
        updateHutUI();
        if (enemyHutHp <= 0 || myHutHp <= 0) { endGame(); return; }
      }
    }

    if (!blocked) {
      u.x += dir * UNIT_SPEED;
    }
    el.style.left = u.x + 'px';
  }
  units = units.filter(u => !toRemove.includes(u.id) || units.find(x => x.id === u.id && x.hp > 0));
  // Clean truly dead
  units = units.filter(u => u.hp > 0);
}

function endGame() {
  gameRunning = false;
  clearInterval(gameLoop); clearInterval(waterInterval);
  const won = enemyHutHp <= 0;
  document.getElementById('go-title').textContent = won ? '🏆 Gewonnen!' : '💀 Verloren!';
  document.getElementById('go-msg').textContent = won ? 'Je hebt de arme kindjes verwoest!' : 'Jouw hut is vernietigd...';
  document.getElementById('game-over').style.display = 'flex';
}

startGame();
</script>
