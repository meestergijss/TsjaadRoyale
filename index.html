<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsjaad Wars</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0f00; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
h1 { color: #ffd080; font-size: 22px; letter-spacing: 3px; margin-bottom: 10px; text-shadow: 0 0 10px #ff8800; }
#game {
  background: linear-gradient(180deg, #87CEEB 0%, #a8c8e8 15%, #c8a96e 45%, #d4b07a 65%, #c9a060 100%);
  width: 700px; height: 460px; position: relative; overflow: hidden;
  border: 3px solid #a0721a; border-radius: 8px; user-select: none;
  image-rendering: pixelated;
}
#sun-sprite { position: absolute; top: 8px; right: 55px; width: 36px; height: 36px; image-rendering: pixelated; }
.lane { position: absolute; bottom: 100px; left: 0; right: 0; height: 60px;
  background: rgba(180,130,60,0.2); border-top: 2px dashed rgba(180,130,60,0.4); }
#ground { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: #b8862a; }
#ground2 { position: absolute; bottom: 0; left: 0; right: 0; height: 38px; background: #a0721a; }
#ground-line { position: absolute; bottom: 100px; left: 0; right: 0; height: 3px; background: #8B6200; }

.hut { position: absolute; bottom: 100px; display: flex; flex-direction: column; align-items: center; }
.hp-bar-wrap { width: 52px; height: 6px; background: #333; border: 1px solid #000; margin-top: 2px; }
.hp-bar { height: 100%; transition: width 0.3s; }
.hut-hp { font-size: 10px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.6);
  padding: 1px 4px; margin-top: 2px; white-space: nowrap; border: 1px solid #555; }

.unit { position: absolute; bottom: 106px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
.unit canvas { image-rendering: pixelated; }
.unit-hp-bar { width: 28px; height: 4px; background: #333; border: 1px solid #000; margin-top: 1px; }
.unit-hp-fill { height: 100%; background: #4ade80; }

#ui-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
  background: rgba(20,10,0,0.95); border-top: 3px solid #a0721a;
  display: flex; align-items: center; padding: 0 10px; gap: 8px;
}
.card-btn {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(140,90,20,0.3); border: 2px solid #7a5010;
  padding: 5px 7px; cursor: pointer; min-width: 72px; color: #f0d090;
  transition: background 0.1s; position: relative;
}
.card-btn:hover { background: rgba(180,120,30,0.5); border-color: #ffa020; }
.card-btn.disabled { opacity: 0.35; cursor: not-allowed; }
.card-btn .card-name { font-size: 9px; font-weight: bold; text-align: center; margin-top: 3px; letter-spacing: 0.5px; }
.card-btn .card-cost { font-size: 10px; color: #60c0ff; margin-top: 1px; }
.card-btn canvas { image-rendering: pixelated; }

#water-bar { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #60c0ff; font-size: 11px; font-weight: bold; margin-right: 4px; }
#water-fill-wrap { width: 14px; height: 68px; background: rgba(0,0,0,0.5); border: 1px solid #3060a0; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
#water-fill { width: 100%; background: #2080cc; transition: height 0.2s; }
#water-count { font-size: 13px; color: #80d0ff; }

#msg { position: absolute; top: 88px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #ffd080; font-size: 13px; font-weight: bold;
  padding: 6px 16px; display: none; white-space: nowrap; z-index: 100;
  border: 2px solid #ff8800; letter-spacing: 1px; }

#sandstorm-overlay {
  position: absolute; inset: 0; background: rgba(180,120,0,0);
  pointer-events: none; z-index: 150; display: flex; align-items: center; justify-content: center;
  transition: background 0.4s;
}
#sandstorm-overlay.active { background: rgba(180,120,0,0.6); }
#sandstorm-msg {
  color: #fff; font-size: 15px; font-weight: bold; background: rgba(60,20,0,0.9);
  padding: 10px 20px; display: none; text-align: center;
  border: 2px solid #ff8800; letter-spacing: 1px; text-shadow: 0 0 8px #ff4400;
}
#sandstorm-overlay.active #sandstorm-msg { display: block; }

.sand-particle {
  position: absolute; border-radius: 50%; background: rgba(200,160,50,0.7);
  pointer-events: none; animation: sandfly linear infinite;
}
@keyframes sandfly {
  from { transform: translateX(0) translateY(0); opacity: 0.8; }
  to { transform: translateX(-300px) translateY(20px); opacity: 0; }
}

#game-over {
  position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none;
  flex-direction: column; align-items: center; justify-content: center; z-index: 200;
  color: #fff; gap: 12px;
}
#game-over h2 { font-size: 26px; font-weight: bold; letter-spacing: 3px; color: #ffd080; text-shadow: 0 0 15px #ff8800; }
#game-over p { font-size: 13px; color: #f0d090; }
#restart-btn {
  background: #8B5010; border: 2px solid #ffa020; color: #fff; font-size: 13px;
  font-weight: bold; padding: 9px 24px; cursor: pointer; letter-spacing: 2px;
  font-family: monospace; margin-top: 4px;
}
#restart-btn:hover { background: #c07820; }

#score-area { position: absolute; top: 88px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 50; }
.score-box { background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; padding: 2px 8px; border: 1px solid #555; }
.score-box span { color: #ffd080; font-weight: bold; }
#storm-timer { position: absolute; top: 88px; right: 10px; background: rgba(0,0,0,0.65); color: #ffd080; font-size: 10px; padding: 2px 6px; border: 1px solid #555; z-index: 50; }
#hint { color: #807060; font-size: 10px; text-align: right; line-height: 1.5; }
</style>
</head>
<body>
<h1>⚔ TSJAAD WARS ⚔</h1>
<div id="game">
  <canvas id="sun-sprite" width="18" height="18" style="width:36px;height:36px"></canvas>
  <div class="lane"></div>
  <div id="ground"></div>
  <div id="ground2"></div>
  <div id="ground-line"></div>

  <div class="hut" id="my-hut" style="left:14px">
    <canvas id="hut-p-canvas" width="26" height="34" style="width:52px;height:68px;image-rendering:pixelated"></canvas>
    <div class="hp-bar-wrap"><div class="hp-bar" id="my-hut-bar" style="background:#4ade80;width:100%"></div></div>
    <div class="hut-hp" id="my-hut-hp">35HP</div>
  </div>
  <div class="hut" id="enemy-hut" style="right:14px">
    <canvas id="hut-e-canvas" width="26" height="34" style="width:52px;height:68px;image-rendering:pixelated"></canvas>
    <div class="hp-bar-wrap"><div class="hp-bar" id="enemy-hut-bar" style="background:#f87171;width:100%"></div></div>

  <div id="score-area">
    <div class="score-box">Jij: <span id="p-score">0</span></div>
    <div class="score-box">Vijand: <span id="e-score">0</span></div>
  </div>
  <div id="storm-timer">⏳ Storm: 20s</div>
  <div id="msg"></div>
  <div id="units-layer"></div>

  <div id="sandstorm-overlay">
    <div id="sandstorm-msg">🌪 KIJK UIT!<br>DE TSJAAD GODEN ZIJN BOOS! 🌪</div>
  </div>

  <div id="game-over">
    <h2 id="go-title">GAME OVER</h2>
    <p id="go-msg">De hutjes zijn kapot!</p>
    <button id="restart-btn" onclick="startGame()">OPNIEUW ARM ZIJN?</button>
  </div>

  <div id="ui-bottom">
    <div id="water-bar">
      <div id="water-fill-wrap"><div id="water-fill" style="height:0%"></div></div>
      <div id="water-count">0💧</div>
    </div>
    <div class="card-btn" id="card0" onclick="placeUnit(0)">
      <canvas width="16" height="16" style="width:32px;height:32px" id="card-sprite-0"></canvas>
      <div class="card-name">BEDELAAR</div>
      <div class="card-cost">1💧 1dmg 1hp</div>
    </div>
    <div class="card-btn" id="card1" onclick="placeUnit(1)">
      <canvas width="16" height="16" style="width:32px;height:32px" id="card-sprite-1"></canvas>
      <div class="card-name">TSJAAD VECHTER</div>
      <div class="card-cost">3💧 3dmg 6hp</div>
    </div>
    <div class="card-btn" id="card2" onclick="placeUnit(2)">
      <canvas width="16" height="16" style="width:32px;height:32px" id="card-sprite-2"></canvas>
      <div class="card-name">ZAND GOOIER</div>
      <div class="card-cost">4💧 2dmg 4hp</div>
    </div>
    <div class="card-btn" id="card3" onclick="placeUnit(3)">
      <canvas width="16" height="16" style="width:32px;height:32px" id="card-sprite-3"></canvas>

      <div class="card-cost">8💧 7dmg 20hp</div>

  </div>
</div>

<script>
// ── PIXEL ART SPRITES ──────────────────────────────────────────────
// Each sprite is a 16x16 grid of color indices. 0 = transparent.
const PAL = {
  // skin tones, clothing, etc.
  skin:  '#E8B87A', skin2: '#C8905A', skin3: '#A06030',
  brown: '#8B4513', dbrown:'#5C2E00', lbrown:'#C4955A',
  red:   '#CC2200', dred:  '#881100', lred:  '#FF5533',
  blue:  '#2255CC', dblue: '#112288', lblue: '#4488FF',
  purple:'#6622BB', dpurp: '#441188', lpurp: '#9944EE',
  gray:  '#888888', dgray: '#555555', lgray: '#BBBBBB',
  white: '#FFFFFF', black: '#111111', yellow:'#FFDD00',
  gold:  '#FFB800', tan:   '#D4A855', dtan:  '#A07833',
  green: '#228822', dgreen:'#115511', lgreen:'#44AA44',
  rock:  '#909090', drock: '#606060', lrock: '#B8B8B8',
  sand:  '#D4B870', dsand: '#A08840', lsand: '#EDD890',
  roofr: '#8B2500', roofl: '#AA3300', hutw:  '#C4956A',
  hutd:  '#5A3010', sky:   '#87CEEB', sun:   '#FFD700',
  sunr:  '#FF8800', trans: null,

const T = null; // transparent

// ── BEDELAAR (beggar) ── 16x16
const SPR_BEGGAR_P = [

  [T,T,T,'brown','skin2','skin','skin2','skin2','skin','skin2','brown',T,T,T,T,T],
  [T,T,T,'brown','skin2','skin2','skin2','skin2','skin2','skin2','brown',T,T,T,T,T],
  [T,T,T,T,'skin2','skin','skin2','skin','skin2','skin',T,T,T,T,T,T],
  [T,T,T,T,'tan','tan','tan','tan','tan','tan',T,T,T,T,T,T],
  [T,T,T,'tan','tan','tan','tan','tan','tan','tan','tan',T,T,T,T,T],
  [T,T,'skin','tan','tan','tan','tan','tan','tan','tan','skin',T,T,T,T,T],
  [T,T,'skin2','tan','dtan','tan','dtan','tan','dtan','tan','skin2',T,T,T,T,T],
  [T,T,T,'tan','tan','tan','tan','tan','tan','tan',T,T,T,T,T,T],
  [T,T,T,'tan','tan',T,T,T,T,'tan','tan',T,T,T,T,T],
  [T,T,T,'brown','brown',T,T,T,T,'brown','brown',T,T,T,T,T],
  [T,T,'brown','brown',T,T,T,T,T,T,'brown','brown',T,T,T,T],
  [T,'brown','brown',T,T,T,T,T,T,T,T,'brown','brown',T,T,T],
  [T,'dbrown','dbrown',T,T,T,T,T,T,T,T,'dbrown','dbrown',T,T,T],
  [T,T,T,T,T,T,T,T,T,T,T,T,T,T,T,T],
];

// ── TSJAAD VECHTER (warrior) ── 16x16
const SPR_WARRIOR_P = [
  [T,T,T,T,'brown','brown','brown','brown','brown','brown',T,T,T,T,T,T],
  [T,T,T,'brown','brown','gold','gold','gold','gold','brown','brown',T,T,T,T,T],
  [T,T,T,'brown','skin','skin','skin','skin','skin','skin','brown',T,T,T,T,T],
  [T,T,T,'brown','skin','black','skin','skin','black','skin','brown',T,T,T,T,T],
  [T,T,T,T,'skin2','skin','skin','skin','skin','skin2',T,T,T,T,T,T],
  [T,T,'red','red','red','red','red','red','red','red','red',T,T,T,T,T],
  [T,'skin','red','dred','red','red','red','red','red','dred','red','skin',T,T,T,T],
  [T,'skin2','red','red','red','red','red','red','red','red','red','skin2',T,T,T,T],
  [T,T,'red','red','red','red','red','red','red','red','red',T,T,T,T,T],
  [T,T,T,'red','red',T,T,T,T,'red','red',T,T,T,T,T],
  [T,T,'gold','red','red',T,T,T,T,'red','red',T,T,T,T,T],
  [T,T,'gold','brown','brown',T,T,T,T,'brown','brown',T,T,T,T,T],
  [T,T,'gold','brown',T,T,T,T,T,T,'brown',T,T,T,T,T],
  [T,T,'gold','dbrown',T,T,T,T,T,T,'dbrown',T,T,T,T,T],
  [T,T,T,'dbrown','dbrown',T,T,T,T,'dbrown','dbrown',T,T,T,T,T],
  [T,T,T,T,T,T,T,T,T,T,T,T,T,T,T,T],
];

// ── ZAND GOOIER (ranged) ── 16x16
const SPR_RANGER_P = [
  [T,T,T,T,'gray','gray','gray','gray','gray','gray',T,T,T,T,T,T],
  [T,T,T,'gray','lgray','lgray','lgray','lgray','lgray','lgray','gray',T,T,T,T,T],
  [T,T,T,'gray','skin','skin','skin','skin','skin','skin','gray',T,T,T,T,T],
  [T,T,T,'gray','skin','skin','skin','skin','skin','skin','gray',T,T,T,T,T],
  [T,T,T,T,'skin2','skin','skin','skin','skin','skin2',T,T,T,T,T,T],
  [T,T,'dgray','gray','gray','gray','gray','gray','gray','gray','lgray','rock',T,T,T,T],
  [T,'skin','gray','gray','gray','gray','gray','gray','gray','gray','gray','skin','rock',T,T,T],
  [T,'skin2','gray','dgray','gray','gray','gray','gray','gray','dgray','gray','skin2','drock',T,T,T],
  [T,T,'gray','gray','gray','gray','gray','gray','gray','gray','gray',T,T,T,T,T],
  [T,T,T,'gray','gray',T,T,T,T,'gray','gray',T,T,T,T,T],
  [T,T,T,'gray','gray',T,T,T,T,'gray','gray',T,T,T,T,T],
  [T,T,T,'dgray','dgray',T,T,T,T,'dgray','dgray',T,T,T,T,T],
  [T,T,'dgray','dgray',T,T,T,T,T,T,'dgray','dgray',T,T,T,T],
  [T,'dgray','dgray',T,T,T,T,T,T,T,T,'dgray','dgray',T,T,T],
  [T,'black','black',T,T,T,T,T,T,T,T,'black','black',T,T,T],
  [T,T,T,T,T,T,T,T,T,T,T,T,T,T,T,T],
];

// ── TSJAADINATOR (lion warrior) ── 16x16
const SPR_LION_P = [
  [T,T,T,'purple','purple','purple','purple','purple','purple','purple','purple',T,T,T,T,T],
  [T,T,'purple','lpurp','lpurp','lpurp','lpurp','lpurp','lpurp','lpurp','lpurp','purple',T,T,T,T],
  [T,T,'purple','skin','skin','skin','skin','skin','skin','skin','skin','purple',T,T,T,T],
  [T,T,'purple','skin','yellow','skin','skin','yellow','skin','skin','skin','purple',T,T,T,T],
  [T,T,T,'skin2','skin','skin','skin','skin','skin','skin','skin2',T,T,T,T,T],
  [T,'gold','purple','purple','purple','purple','purple','purple','purple','purple','purple','gold',T,T,T,T],
  [T,'gold','dpurp','purple','lpurp','purple','purple','lpurp','purple','purple','dpurp','gold',T,T,T,T],
  [T,'gold','purple','purple','purple','purple','purple','purple','purple','purple','purple','gold',T,T,T,T],
  [T,T,'purple','purple','purple','purple','purple','purple','purple','purple','purple',T,T,T,T,T],
  [T,T,T,'purple','purple',T,T,T,T,'purple','purple',T,T,T,T,T],
  [T,'gold','gold','purple','purple',T,T,T,T,'purple','purple','gold',T,T,T,T],
  [T,'gold',T,'dpurp','dpurp',T,T,T,T,'dpurp','dpurp',T,'gold',T,T,T],
  [T,T,T,'dpurp','dpurp',T,T,T,T,'dpurp','dpurp',T,T,T,T,T],
  [T,T,'dpurp','dpurp',T,T,T,T,T,T,'dpurp','dpurp',T,T,T,T],
  [T,'black','black',T,T,T,T,T,T,T,T,'black','black',T,T,T],
  [T,T,T,T,T,T,T,T,T,T,T,T,T,T,T,T],
];

// Enemy versions (mirrored + recolored slightly)
const SPR_BEGGAR_E   = mirrorSprite(SPR_BEGGAR_P);
const SPR_WARRIOR_E  = mirrorAndRecolor(SPR_WARRIOR_P, {'red':'blue','dred':'dblue','lred':'lblue'});
const SPR_RANGER_E   = mirrorSprite(SPR_RANGER_P);
const SPR_LION_E     = mirrorAndRecolor(SPR_LION_P, {'purple':'red','lpurp':'lred','dpurp':'dred'});

function mirrorSprite(spr) {
  return spr.map(row => [...row].reverse());
}
function mirrorAndRecolor(spr, remap) {
  return spr.map(row => row.slice().reverse().map(c => (c && remap[c]) ? remap[c] : c));
}

// HUT sprite 26x34
const HUT_P_DATA = (() => {
  const w=26, h=34, d=[];
  for(let y=0;y<h;y++) {
    const row=[];
    for(let x=0;x<w;x++) {
      // roof (triangle)
      if(y < 14) {
        const cx = 13, slope = 14;
        const edge = Math.abs(x - cx);
        const limit = Math.round(slope - y * (slope/14));
        if(edge <= limit) {
          if(edge === limit || y===0) row.push('brown');
          else if(y < 2) row.push('brown');
          else row.push('lbrown');
        } else row.push(null);
      } else {
        // body
        const bx = 3, bw = 20;
        if(x >= bx && x < bx+bw) {
          if(x===bx || x===bx+bw-1 || y===14 || y===h-1) row.push('dbrown');
          else if(x>=10&&x<=15&&y>=22) row.push('hutd'); // door
          else row.push('hutw');
        } else row.push(null);
      }
    }
    d.push(row);
  }
  return d;
})();

const HUT_E_DATA = (() => {
  return HUT_P_DATA.map(row => row.map(c => {
    if(c==='lbrown') return 'roofl';
    if(c==='brown') return 'roofr';
    if(c==='hutw') return '#c46a6a';
    if(c==='dbrown') return '#8B2500';
    return c;
  }));
})();

// SUN sprite 18x18
const SUN_DATA = (() => {
  const d=[];
  for(let y=0;y<18;y++){
    const row=[];
    for(let x=0;x<18;x++){
      const cx=8.5,cy=8.5,r=6,r2=7;
      const dx=x-cx,dy=y-cy,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=r) row.push('sun');
      else if(dist<=r2 && (Math.abs(dx)<1||Math.abs(dy)<1||Math.abs(Math.abs(dx)-Math.abs(dy))<1)) row.push('sunr');
      else row.push(null);
    }
    d.push(row);
  }
  return d;
})();

function drawSprite(canvas, spriteData, scale=1) {
  const rows = spriteData.length;
  const cols = spriteData[0].length;
  canvas.width = cols; canvas.height = rows;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,cols,rows);
  for(let y=0;y<rows;y++) {
    for(let x=0;x<cols;x++) {
      const c = spriteData[y][x];
      if(!c) continue;
      const color = PAL[c] || c;
      ctx.fillStyle = color;
      ctx.fillRect(x,y,1,1);
    }
  }
}

function drawHutSprite(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  drawSprite(canvas, data);
}

function initSprites() {
  drawHutSprite('hut-p-canvas', HUT_P_DATA);
  drawHutSprite('hut-e-canvas', HUT_E_DATA);
  // Sun
  drawSprite(document.getElementById('sun-sprite'), SUN_DATA);
  // Card sprites
  const cardSprites = [SPR_BEGGAR_P, SPR_WARRIOR_P, SPR_RANGER_P, SPR_LION_P];
  cardSprites.forEach((spr, i) => {
    drawSprite(document.getElementById('card-sprite-'+i), spr);
  });
}

// ── GAME LOGIC ──────────────────────────────────────────────────────
// Base stats (never mutated — upgrades tracked separately)
const BASE_CARDS = [
  { name:'Bedelaar',       cost:1, dmg:1, hp:1,  range:10, atkRate:1200, sprP:SPR_BEGGAR_P,  sprE:SPR_BEGGAR_E  },
  { name:'Tsjaad Vechter', cost:3, dmg:3, hp:6,  range:10, atkRate:1200, sprP:SPR_WARRIOR_P, sprE:SPR_WARRIOR_E },
  { name:'Zand Gooier',   cost:4, dmg:2, hp:4,  range:80, atkRate:1200, sprP:SPR_RANGER_P,  sprE:SPR_RANGER_E  },
  { name:'Tsjaadinator',  cost:8, dmg:7, hp:20, range:10, atkRate:2200, sprP:SPR_LION_P,    sprE:SPR_LION_E    },
];
// Live card stats (upgraded during play)
let CARDS = [];

const MAX_HUT_HP=35, MAX_WATER=10, WATER_RATE=1.2, UNIT_SPEED=1.1;
const STORM_INTERVAL=20000, STORM_DURATION=3000, STORM_DAMAGE=2;
const GAME_W=700;
const ENEMY_UPGRADE_INTERVAL=30000;

let water, units, nextId, gameRunning, gameLoop, waterInterval;
let myHutHp, enemyHutHp, lastAiSpawn, stormActive, stormCountdown;
let sandParticles=[];
// Upgrade tracking: placed count per card type, and upgrade level per card type
let placedCount, upgradeLevels;
// Enemy upgrade tracking
let lastEnemyUpgrade, enemyUpgradeLevels;

function startGame() {
  water=5; units=[]; nextId=0;
  myHutHp=MAX_HUT_HP; enemyHutHp=MAX_HUT_HP;
  lastAiSpawn=0; stormActive=false;
  placedCount=[0,0,0,0];
  upgradeLevels=[0,0,0,0];
  enemyUpgradeLevels=[0,0,0,0];
  lastEnemyUpgrade=Date.now();
  // Deep-copy base cards into live CARDS
  CARDS=BASE_CARDS.map(c=>Object.assign({},c));
  document.getElementById('units-layer').innerHTML='';
  document.getElementById('game-over').style.display='none';
  document.getElementById('sandstorm-overlay').classList.remove('active');
  document.getElementById('p-score').textContent='0';
  document.getElementById('e-score').textContent='0';
  removeSandParticles();
  updateHutUI(); updateWaterUI(); updateCardUI();
  gameRunning=true;
  clearInterval(waterInterval); clearInterval(gameLoop); clearInterval(stormCountdown);

  waterInterval=setInterval(()=>{
    if(!gameRunning) return;
    water=Math.min(MAX_WATER, water+WATER_RATE*0.25);
    updateWaterUI(); updateCardUI();
  },250);

  let stormClock=STORM_INTERVAL;
  stormCountdown=setInterval(()=>{
    if(!gameRunning) return;
    stormClock-=250;
    const secs=Math.max(0,Math.ceil(stormClock/1000));
    document.getElementById('storm-timer').textContent=stormActive?'🌪 STORM!':'⏳ Storm: '+secs+'s';
    if(stormClock<=0 && !stormActive){
      stormClock=STORM_INTERVAL;
      triggerSandstorm();
    }
  },250);

  gameLoop=setInterval(tick, 60);
}

function triggerSandstorm() {
  if(!gameRunning) return;
  stormActive=true;
  document.getElementById('sandstorm-overlay').classList.add('active');
  spawnSandParticles();
  showMsg('🌪 KIJK UIT! DE TSJAAD GODEN ZIJN BOOS! 🌪');
  setTimeout(()=>{
    if(!gameRunning) return;
    const dead=[];
    units.forEach(u=>{
      u.hp-=STORM_DAMAGE;
      const hf=document.getElementById('hf-'+u.id);
      if(hf) hf.style.width=Math.max(0,u.hp/u.maxHp*100)+'%';
      if(u.hp<=0) dead.push(u.id);
    });
    dead.forEach(id=>removeUnit(id));
    document.getElementById('sandstorm-overlay').classList.remove('active');
    removeSandParticles();
    stormActive=false;
  }, STORM_DURATION);
}

function spawnSandParticles() {
  const layer=document.getElementById('units-layer');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='sand-particle';
    const size=Math.random()*4+2;
    p.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*360}px;left:${Math.random()*700+700}px;animation-duration:${(Math.random()*1.5+0.8).toFixed(2)}s;animation-delay:${(Math.random()*2).toFixed(2)}s;`;
    document.getElementById('game').appendChild(p);
    sandParticles.push(p);
  }
}
function removeSandParticles(){sandParticles.forEach(p=>p.remove());sandParticles=[];}

function showMsg(txt){
  const m=document.getElementById('msg');
  m.textContent=txt; m.style.display='block';
  clearTimeout(m._t);
  m._t=setTimeout(()=>m.style.display='none', 3500);
}

function updateWaterUI(){
  document.getElementById('water-fill').style.height=(water/MAX_WATER*100)+'%';
  document.getElementById('water-count').textContent=Math.floor(water)+'💧';
}
function updateCardUI(){
  const labels=['BEDELAAR','TSJAAD VECHTER','ZAND GOOIER','TSJAADINATOR'];
  CARDS.forEach((c,i)=>{
    const el=document.getElementById('card'+i);
    if(!el) return;
    el.classList.toggle('disabled', Math.floor(water)<c.cost);
    const costEl=el.querySelector('.card-cost');
    if(costEl){
      const lvl=upgradeLevels[i];
      const lvlStr=lvl>0?' ★'+lvl:'';
      costEl.textContent=c.cost+'💧 '+c.dmg+'dmg '+c.hp+'hp'+lvlStr;
    }
  });
}
function updateHutUI(){
  const mh=Math.max(0,myHutHp), eh=Math.max(0,enemyHutHp);
  document.getElementById('my-hut-hp').textContent=mh+' HP';
  document.getElementById('enemy-hut-hp').textContent=eh+' HP';
  document.getElementById('my-hut-bar').style.width=(mh/MAX_HUT_HP*100)+'%';
  document.getElementById('enemy-hut-bar').style.width=(eh/MAX_HUT_HP*100)+'%';
  const mb=document.getElementById('my-hut-bar');
  mb.style.background=mh>20?'#4ade80':mh>10?'#facc15':'#f87171';
}

function placeUnit(cardIdx){
  const c=CARDS[cardIdx];
  if(!gameRunning||Math.floor(water)<c.cost){showMsg('Niet genoeg waterdruppels!');return;}
  water-=c.cost; updateWaterUI(); updateCardUI();
  placedCount[cardIdx]++;
  checkPlayerUpgrade(cardIdx);
  spawnUnit(cardIdx, true);
}

function checkPlayerUpgrade(cardIdx){
  const threshold=10;
  const newLevel=Math.floor(placedCount[cardIdx]/threshold);
  if(newLevel>upgradeLevels[cardIdx]){
    upgradeLevels[cardIdx]=newLevel;
    CARDS[cardIdx].hp+=1;
    CARDS[cardIdx].dmg+=1;
    // Also buff all existing live units of this type
    units.forEach(u=>{
      if(u.isPlayer&&u.cardIdx===cardIdx){
        u.hp+=1; u.maxHp+=1;
        const hf=document.getElementById('hf-'+u.id);
        if(hf) hf.style.width=Math.max(0,u.hp/u.maxHp*100)+'%';
      }
    });
    showUpgradeMsg(cardIdx);
    updateCardUI();
  }
}

function showUpgradeMsg(cardIdx){
  const name=CARDS[cardIdx].name.toUpperCase();
  const lvl=upgradeLevels[cardIdx];
  // Special message for Tsjaadinator
  const isTsjaad=cardIdx===3;
  const mainMsg=isTsjaad?'✨ HIJ IS TSJAADASTISCH! ✨':'⬆ '+name+' GEUPGRADED! ★'+lvl;
  showSpecialMsg(mainMsg, isTsjaad?'#ff44ff':'#44ffaa');
}

function showSpecialMsg(txt, color){
  const m=document.getElementById('msg');
  m.textContent=txt;
  m.style.borderColor=color||'#ff8800';
  m.style.color=color||'#ffd080';
  m.style.display='block';
  clearTimeout(m._t);
  m._t=setTimeout(()=>{ m.style.display='none'; m.style.borderColor='#ff8800'; m.style.color='#ffd080'; }, 3000);
}

function spawnUnit(cardIdx, isPlayer, overrideDmg, overrideHp){
  const c=CARDS[cardIdx];
  const id='u'+nextId++;
  const startX=isPlayer?90:GAME_W-120;
  const spr=isPlayer?c.sprP:c.sprE;
  // Enemy gets their own upgraded stats
  const dmg=overrideDmg!==undefined?overrideDmg:c.dmg;
  const hp=overrideHp!==undefined?overrideHp:c.hp;
  const unit={id,cardIdx,isPlayer,x:startX,hp,maxHp:hp,dmg,range:c.range,lastAtk:0,atkRate:c.atkRate};
  units.push(unit);

  const div=document.createElement('div');
  div.className='unit'; div.id=id;
  const cvs=document.createElement('canvas');
  cvs.width=16; cvs.height=16;
  cvs.style.width='32px'; cvs.style.height='32px';
  cvs.style.imageRendering='pixelated';
  drawSprite(cvs, spr);
  const hpBar=document.createElement('div');
  hpBar.className='unit-hp-bar';
  hpBar.innerHTML='<div class="unit-hp-fill" id="hf-'+id+'" style="width:100%"></div>';
  div.appendChild(cvs); div.appendChild(hpBar);
  div.style.left=startX+'px';
  document.getElementById('units-layer').appendChild(div);
}

function removeUnit(id){
  const el=document.getElementById(id);
  if(el){el.style.opacity='0';el.style.transition='opacity 0.25s';setTimeout(()=>el.remove(),280);}
  units=units.filter(u=>u.id!==id);
}

function tick(){
  if(!gameRunning) return;
  const now=Date.now();
  const enemyHutX=GAME_W-80, myHutX=70;

  if(now-lastAiSpawn>3800){
    lastAiSpawn=now;
    const r=Math.random();
    const cardIdx=r<0.3?0:r<0.6?1:r<0.85?2:3;
    const lvl=enemyUpgradeLevels[cardIdx];
    const base=BASE_CARDS[cardIdx];
    spawnUnit(cardIdx, false, base.dmg+lvl, base.hp+lvl);
  }

  // Enemy random unit upgrade every 30s
  if(now-lastEnemyUpgrade>ENEMY_UPGRADE_INTERVAL){
    lastEnemyUpgrade=now;
    const cardIdx=Math.floor(Math.random()*4);
    enemyUpgradeLevels[cardIdx]++;
    const name=BASE_CARDS[cardIdx].name.toUpperCase();
    showSpecialMsg('👹 VIJAND '+name+' WORDT STERKER! ★'+enemyUpgradeLevels[cardIdx],'#ff6644');
  }

  const toRemove=[];
  for(const u of units){
    const el=document.getElementById(u.id);
    if(!el){toRemove.push(u.id);continue;}
    const dir=u.isPlayer?1:-1;
    let blocked=false;

    let nearestEnemy=null, nearestDist=Infinity;
    for(const o of units){
      if(o.isPlayer===u.isPlayer||o.hp<=0) continue;
      const dist=Math.abs(o.x-u.x);
      if(dist<nearestDist){nearestDist=dist;nearestEnemy=o;}
    }

    const hutDist=u.isPlayer?Math.abs(u.x-enemyHutX):Math.abs(u.x-myHutX);
    const rate=u.atkRate||1200;

    if(nearestEnemy&&nearestDist<=u.range){
      blocked=true;
      if(now-u.lastAtk>rate){
        nearestEnemy.hp-=u.dmg; u.lastAtk=now;
        const hf=document.getElementById('hf-'+nearestEnemy.id);
        if(hf) hf.style.width=Math.max(0,nearestEnemy.hp/nearestEnemy.maxHp*100)+'%';
        if(nearestEnemy.hp<=0) toRemove.push(nearestEnemy.id);
      }
    } else if(hutDist<=u.range+5){
      blocked=true;
      if(now-u.lastAtk>rate){
        if(u.isPlayer) enemyHutHp-=u.dmg; else myHutHp-=u.dmg;
        u.lastAtk=now; updateHutUI();
        if(enemyHutHp<=0||myHutHp<=0){endGame();return;}
      }
    }

    if(!blocked) u.x+=dir*UNIT_SPEED;
    el.style.left=u.x+'px';
  }

  const seen=new Set();
  for(const id of toRemove){
    if(seen.has(id)) continue; seen.add(id);
    removeUnit(id);
  }
  units=units.filter(u=>u.hp>0);
}

function endGame(){
  gameRunning=false;
  clearInterval(gameLoop); clearInterval(waterInterval); clearInterval(stormCountdown);
  const won=enemyHutHp<=0;
  document.getElementById('go-title').textContent=won?'🏆 GEWONNEN!':'💀 VERLOREN!';
  document.getElementById('go-msg').textContent=won?'Je hebt de arme kindjes verwoest!':'Jouw hut is vernietigd...';
  document.getElementById('game-over').style.display='flex';
}

initSprites();
startGame();
</script>
</body>
</html>
